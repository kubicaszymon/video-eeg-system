[aliases]
test = pytest
docs = build_sphinx
codestyle = flake8

[bdist_wheel]
universal=1


# See the docstring in versioneer.py for instructions. Note that you must
# re-run 'versioneer.py setup' after changing this section, and commit the
# resulting files.

[versioneer]
VCS = git
style = pep440
versionfile_source = braintech/obci/experiment/_version.py
versionfile_build = braintech/obci/experiment/_version.py
tag_prefix = ''
parentdir_prefix = ''

[devpi:upload]
formats = sdist,bdist_wheel
no_vcs = 1
